# Release deploy — run a prebuilt binary from GitHub Releases (no compiling):
#   docker compose -f docker-compose.release.yml up -d --build
#
# Pin a version with SUB2PROXY_VERSION (default: latest release):
#   SUB2PROXY_VERSION=v0.1.0 docker compose -f docker-compose.release.yml up -d --build
#
# Note: with the default "latest", Docker caches the download layer — to pick up a
# newer release, rebuild with --no-cache (or pin an explicit version tag).
#
# Uses host networking: the app binds the whole 27000-27999 range directly on the
# host, which avoids creating ~1000 docker-proxy port mappings (slow and heavy on a
# busy host). This is a Linux-server deploy file. On Linux, host mode reaches the
# LAN automatically; to restrict to this host only set `listen: 127.0.0.1:27000`
# and 127.0.0.1 mapping ports in config.yaml. (Host mode is a no-op on Docker
# Desktop/macOS — for local dev use docker-compose.yml instead.)
services:
  sub2proxy:
    build:
      context: .
      dockerfile: Dockerfile.release
      args:
        SUB2PROXY_VERSION: ${SUB2PROXY_VERSION:-latest}
    image: sub2proxy:release
    container_name: sub2proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:27000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
