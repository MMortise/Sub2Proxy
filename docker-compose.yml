# sub2proxy — one-command deploy: `docker compose up -d`
#
# Ports:
#   27000       Web UI / API
#   27100-27199 proxy mapping ports (100 ports; each mapping binds one)
#
# Published on all interfaces so the LAN can reach the Web UI and proxy ports.
# Note: the Web UI (27000) is protected by the login key, but a proxy port
# (27100-27199) is only protected if you set a username/password on that mapping —
# otherwise anyone on the LAN can use it. To restrict to this host only, prefix
# both mappings with 127.0.0.1. If you grow the range, keep the published ports
# and `port_range` in config.yaml in sync.
services:
  sub2proxy:
    build: .
    image: sub2proxy:latest
    container_name: sub2proxy
    restart: unless-stopped
    ports:
      - "27000:27000"
      - "27100-27199:27100-27199"
    volumes:
      # Single data volume: config.yaml (source of truth) + nodes.json cache live
      # here. On first run the app writes a config.yaml template into ./data;
      # edit ./data/config.yaml to set auth_key, then restart.
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:27000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
